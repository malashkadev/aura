<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <style>
    .logo-outer,
    .logo-inner,
    .logo-outer-ripple {
      transform-origin: center;
      transform-box: view-box;
    }
    .logo-outer {
      stroke: #ff4200;
    }
    .logo-outer-ripple {
