<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Overlay</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    svg {
      width: 103px;
      height: 30px;
      display: block;
      transform: scale(1.3);
    }

    #overlay-status {
      margin-top: 6px;
      font-family: "Segoe UI", sans-serif;
      font-size: 9px;
      line-height: 11px;
      color: #b8b8b8;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      text-align: center;
      max-width: 140px;
      word-wrap: break-word;
    }

    #overlay-status.error {
      color: #ff5c5c;
      font-weight: 600;
    }

    .overlay-pill {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .overlay-pill.visible {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
